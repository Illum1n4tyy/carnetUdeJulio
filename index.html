<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Carné Virtual – ESAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
     min-height: 100vh;
    min-height: 100dvh;   /* ← altura dinámica real en móvil */
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    font-family: 'Barlow', sans-serif;
    padding: 0;            /* ← quita el padding: 24px */
    margin: 0;
    overflow: hidden;
    }

    /* ── Phone ── */
    .phone {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0px;
      background: #111;
      box-shadow: 0 30px 80px rgba(0,0,0,.7), inset 0 0 0 1px #333;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* status bar */
    .status-bar {
      background: #A80E0E;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 18px;
      font-size: 12px;
      color: #fff;
      font-weight: 600;
    }
    .status-bar .left { display: flex; gap: 8px; align-items: center; }
    .status-bar .right { display: flex; gap: 6px; align-items: center; font-size: 11px; }

    /* header */
    .app-header {
      background: #CF1111;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px 14px;
      color: #fff;
      position: relative;
    }
    .app-header .back {  position: absolute; left: 16px; display:flex; align-items: center; }
    .app-header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; letter-spacing: .5px; }

    /* card body */
    .card-body {
     background: #f5f5f5;
  padding: 24px 20px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  flex: 1;        /* ocupa todo el espacio entre header y nav */
    }


    /* ESAN  */
    .watermark {
      position: absolute;
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      opacity: 0.08;       
      z-index: 0;
    }

    /* photo */
    .photo-frame {
      width: 170px;
      height: 210px;
      border: 2.5px solid #C0392B;
      border-radius: 8px;
      overflow: hidden;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      cursor: pointer;
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #999;
      font-size: 12px;
      text-align: center;
      padding: 8px;
    }
    .photo-placeholder svg { opacity: .4; }

    /* clock */
    .clock-box {
      border: 2px solid #CF1111;
    border-radius: 12px;
    padding: 8px 20px;
    width: fit-content;  
    text-align: center;
    position: relative;
    z-index: 1;
    }
    .clock-box #clock {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 64px; /*38 */
      font-weight: 700;
      color: #25A71B;
      letter-spacing: 1px;
      line-height: 1;
    }

    /* info fields */
    .info-block {
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .field-label {
      font-size: 15px;
      color: #999;
      text-transform: none;
      margin-bottom: 1px;
    }
    .field-value {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: .3px;
    }

        /* barcode */
    .barcode-section {
        width: 100%;
        padding-top: 10px;
        border-top: 1px solid #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        position: relative;
        z-index: 1;
        margin-top: auto;
    }
    .barcode {
        display: flex;
        gap: 0px;
        height: 60px;
        align-items: stretch;
        width: 100%;
    }
    .bar {
        background: #CF1111;
        flex: 1;
    }
    .bar.thin  { flex: 0.4; }
    .bar.thick { flex: 1.2; }
    .bar.gap   { background: transparent; flex: 0.5; }
    .barcode-number {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        color: #CF1111;
        letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div style="display:flex; flex-direction:column; align-items:center;">

  <!-- ── Phone ── -->
  <div class="phone">

    <!-- status bar -->
    <div class="status-bar">
  <div class="left">
    <span id="sb-time">10:42</span>
    <!-- WhatsApp -->
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.118 1.522 5.855L.057 23.886a.5.5 0 00.611.611l6.031-1.465A11.942 11.942 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.512-5.228-1.403l-.374-.216-3.878.942.942-3.878-.216-.374A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
    <!-- Instagram -->
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></div>
  <div class="right">
    <!-- Señal -->
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
    <span style="font-size:10px; font-weight:700;">5G</span>
    <!-- Batería -->
    <svg width="18" height="14" viewBox="0 0 24 12" fill="#fff"><rect x="0" y="1" width="21" height="10" rx="2" ry="2" stroke="#fff" stroke-width="1.5" fill="none"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="#fff"/><path d="M22 4v4" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
</div>
    <!-- header -->
    <div class="app-header">
        <span class="back" onclick="entrarFullscreen()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        </span>
      <h1>Carné Virtual – Pregrado</h1>
    </div>

    <!-- card -->
    <div class="card-body">
    <img class="watermark" src="mark.png" alt="" />
      <!-- photo -->
     <div class="photo-frame" id="photoToggle">
  <img id="foto-principal" src="foto.jpg" alt="Foto estudiante" />
  <img id="foto-secundaria" src="foto2.jpg" alt="Foto secundaria" 
       style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;" />
</div>

      <!-- clock -->
      <div class="clock-box">
        <div id="clock">--:--:-- --</div>
      </div>

      <!-- fields -->
      <div class="info-block">
        <div class="field-label">Nombres</div>
        <div class="field-value">AXEL RODRIGO</div>
      </div>

      <div class="info-block">
        <div class="field-label">Apellidos</div>
        <div class="field-value">SANDOVAL RAMOS</div>
      </div>

      <div class="info-block">
        <div class="field-label">Carrera</div>
        <div class="field-value">INGENIERÍA DE SOFTWARE</div>
      </div>

      <!-- barcode -->
      <div class="barcode-section">
        <div class="barcode" id="barcode"></div>
        <div class="barcode-number">26123456</div>
      </div>
    </div>

</div>

<script>
  // ── Reloj en tiempo real ──
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const ampm = h >= 12 ? 'p. m.' : 'a. m.';
    document.getElementById('clock').textContent = `${h}:${m}:${s} ${ampm}`;

    // status bar time
    const sbH = String(now.getHours()).padStart(2,'0');
    const sbM = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('sb-time').textContent = `${sbH}:${sbM}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Barcode tipo EAN/Code128 visual ──
    const container = document.getElementById('barcode');
    const pattern = [
    1,1,2,1,1,1,2,1,1,1,1,2,1,1,2,1,1,1,1,2,
    1,2,1,1,1,1,2,1,1,2,1,1,1,2,1,1,1,1,2,1,
    2,1,1,1,1,2,1,1,2,1,1,1,2,1,1,1,1,2,1,1,
    1,2,1,1,1,2,1,1,1,1,2,1,2,1,1,1,1,2,1,1,
    2,1,1,2,1,1,1,1,2,1,1,1,2,1
    ];
    pattern.forEach((w, i) => {
    const bar = document.createElement('div');
    if (i % 2 === 0) {
        bar.className = 'bar' + (w === 2 ? ' thick' : w === 1 ? ' thin' : '');
    } else {
        bar.className = 'bar gap';
    }
    container.appendChild(bar);
    });
    // ── Toggle de foto ──
    const photoToggle = document.getElementById('photoToggle');
    const foto1 = document.getElementById('foto-principal');
    const foto2 = document.getElementById('foto-secundaria');

    photoToggle.addEventListener('click', () => {
    if (foto2.style.display === 'none') {
        foto1.style.display = 'none';
        foto2.style.display = 'block';
    } else {
        foto2.style.display = 'none';
        foto1.style.display = 'block';
    }
    });
    function entrarFullscreen() {
  if (!document.fullscreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
</script>

</body>
</html>
